name = "dmjr"
main = "_worker.js"
compatibility_date = "2026-04-16"
compatibility_flags = ["nodejs_compat"]

# Serve static files from the repo root as assets, with SPA-style HTML routing.
# env.ASSETS.fetch(request) is used inside _worker.js for non-API paths.
[assets]
directory = "."
binding = "ASSETS"

# D1 binding → env.DB
[[d1_databases]]
binding = "DB"
database_name = "dmj-content"
database_id = "2ebc7e22-7b75-4d65-a5fd-5eb47b469398"

# R2 binding → env.MEDIA
[[r2_buckets]]
binding = "MEDIA"
bucket_name = "dmj-media"

# Exclude non-site files from being bundled as static assets
[[rules]]
type = "Text"
globs = ["README.md"]
fallthrough = false
